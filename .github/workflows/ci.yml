name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit & Property Tests ────────────────────────────────────────────────────
  test:
    name: Unit & Property Tests
    runs-on: ubuntu-latest

    env:
      # These are placeholder values — unit tests mock Supabase/Resend/PawaPay.
      # No real secrets are needed for unit tests.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock
      APPLICATION_FEE_USD: "29"
      RESEND_API_KEY: placeholder-resend-key
      FROM_EMAIL: admissions@ignitoacademy.com
      INTAKE_YEAR: "2026"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit & property tests
        run: npm run test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── TypeScript & Lint ────────────────────────────────────────────────────────
  lint:
    name: TypeScript & Lint
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock
      APPLICATION_FEE_USD: "29"
      RESEND_API_KEY: placeholder-resend-key
      FROM_EMAIL: admissions@ignitoacademy.com
      INTAKE_YEAR: "2026"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ─── OTHM Keyword Guard ───────────────────────────────────────────────────────
  othm-guard:
    name: OTHM Keyword Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for prohibited keyword
        run: |
          set +e
          # Exclude node_modules, .next, .git, and this workflow file itself
          MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
            --include="*.jsx" --include="*.json" --include="*.sql" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git \
            "OTHM" . 2>/dev/null)
          set -e
          if [ -n "$MATCHES" ]; then
            echo "❌ FORBIDDEN KEYWORD 'OTHM' DETECTED:"
            echo "$MATCHES"
            echo ""
            echo "Use 'UK Level 3 Foundation Diploma' instead."
            exit 1
          fi
          echo "✅ No prohibited keyword found."

  # ─── Build Verification ───────────────────────────────────────────────────────
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [test, lint]

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: https://admissions.ignitoacademy.com
      PAYMENT_PROVIDER: mock
      APPLICATION_FEE_USD: "29"
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: admissions@ignitoacademy.com
      INTAKE_YEAR: "2026"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─── E2E Tests (staging only, triggered manually or on main) ─────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    # Only run E2E on pushes to main (not on PRs) to conserve CI minutes.
    # Requires E2E credentials to be set as GitHub repository secrets.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.E2E_ENABLED == 'true'

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: https://admissions.ignitoacademy.com
      PAYMENT_PROVIDER: mock
      APPLICATION_FEE_USD: "29"
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: admissions@ignitoacademy.com
      INTAKE_YEAR: "2026"
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --project chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
